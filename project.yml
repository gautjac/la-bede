name: LaBede
options:
  bundleIdPrefix: com.jac
  developmentLanguage: fr
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    # Swift 5 language mode: the Swift 6.x compiler in Xcode 27 still builds the
    # new FoundationModels / ImagePlayground / SwiftData APIs, but without strict
    # concurrency we avoid actor-isolation churn in a small, single-author app —
    # matching the rest of the Atelier on-device-LLM apps (Topo, Le Bilan).
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    # Jac's personal Apple ID team — a stable identifier keeps the code signature
    # steady so on-device entitlements provision against one consistent identity.
    DEVELOPMENT_TEAM: 9WZ66DZ69J
    CODE_SIGN_STYLE: Automatic
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  LaBede:
    type: application
    platform: iOS
    sources:
      - path: LaBede
    resources:
      - path: LaBede/Resources/Assets.xcassets
    info:
      path: LaBede/Resources/Info.plist
      properties:
        CFBundleDisplayName: La Bédé
        CFBundleName: LaBede
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDevelopmentRegion: fr
        CFBundleLocalizations: [fr, en]
        NSHumanReadableCopyright: "© 2026 Jacques Gautreau"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jac.LaBede
        PRODUCT_NAME: LaBede
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  LaBedeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LaBedeTests
    dependencies:
      - target: LaBede
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jac.LaBedeTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LaBede.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LaBede"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  LaBede:
    build:
      targets:
        LaBede: all
        LaBedeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LaBedeTests
      gatherCoverageData: false
    archive:
      config: Release
